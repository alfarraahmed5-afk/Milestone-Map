<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Story — A Map of Every Moment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Infant:ital,wght@0,400;0,600;1,400;1,600&family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:      #DB2777;
      --pink-deep: #9D174D;
      --gold:      #CA8A04;
      --cream:     #FFF8F2;
    }

    body {
      font-family: 'Cormorant Infant', serif;
      background: var(--cream);
      overflow: hidden;
      height: 100vh; width: 100vw;
      -webkit-font-smoothing: antialiased;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 45% at 15% 85%, rgba(244,114,182,.11) 0%, transparent 65%),
        radial-gradient(ellipse 50% 50% at 85% 15%, rgba(202,138,4,.08) 0%, transparent 60%);
    }

    /* ── CANVAS ── */
    #particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

    /* ── HEADER ── */
    #hdr {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      padding: 20px 36px 0;
      display: flex; align-items: flex-start; justify-content: space-between;
      pointer-events: none;
    }
    .hdr-title {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2rem, 3.5vw, 3.6rem);
      color: var(--pink-deep); line-height: 1;
      text-shadow: 0 2px 18px rgba(157,23,77,.14);
      opacity: 0;
      animation: fadeUp .9s cubic-bezier(.34,1.56,.64,1) .2s forwards;
    }
    .hdr-sub {
      font-size: clamp(.65rem,.9vw,.8rem); font-style: italic;
      color: #BE185D; letter-spacing: .18em; text-transform: uppercase; margin-top: 3px;
      opacity: 0; animation: fadeIn .7s ease 1s forwards;
    }
    .hdr-right { text-align: right; opacity: 0; animation: fadeIn .7s ease 1.3s forwards; }
    .hdr-count { font-family: 'Great Vibes', cursive; font-size: clamp(1rem,1.6vw,1.5rem); color: var(--gold); }
    .hdr-hint  { font-size: .68rem; font-style: italic; color: #BE185D; letter-spacing: .1em; text-transform: uppercase; margin-top: 2px; }

    /* ── MAP ── */
    #map-wrap { position: fixed; inset: 0; z-index: 2; display: flex; align-items: center; justify-content: center; }
    #map-svg  { width: 100%; height: 100%; max-width: 100vw; max-height: 100vh; }

    .state   { fill: rgba(255,248,245,.88); stroke: rgba(219,39,119,.2); stroke-width: .5; transition: fill .25s ease; }
    .state:hover { fill: rgba(244,114,182,.13); }
    .borders { fill: none; stroke: rgba(219,39,119,.15); stroke-width: .25; pointer-events: none; }
    .nation  { fill: none; stroke: rgba(157,23,77,.35); stroke-width: 1; pointer-events: none; }

    /* journey segments — only drawn between nearby milestones */
    .jseg {
      stroke: var(--pink); stroke-width: 1;
      stroke-dasharray: 4 4; opacity: .3;
      stroke-linecap: round; fill: none;
      pointer-events: none;
    }

    /* ── PINS ── */
    .pin { cursor: pointer; }
    .pin:focus { outline: none; }

    /*
      Hover lift: we target the visual inner group (.pv).
      transform-box:fill-box + transform-origin:bottom center ensures
      the pin lifts from its tip rather than the SVG origin.
    */
    .pin .pv {
      transform-box: fill-box;
      transform-origin: center bottom;
      transition: transform .22s cubic-bezier(.34,1.56,.64,1), filter .22s ease;
    }
    .pin:hover .pv,
    .pin:focus .pv {
      transform: translateY(-5px) scale(1.15);
      filter: drop-shadow(0 6px 12px rgba(0,0,0,.22));
    }

    /* pulse rings — CSS animation on hover only */
    .ring { fill: none; stroke-width: 1.5; opacity: 0; }
    .pin:hover .ring:nth-of-type(1) { animation: pulse 1.4s ease-out infinite; }
    .pin:hover .ring:nth-of-type(2) { animation: pulse 1.4s ease-out .5s infinite; }

    /* tooltip */
    .ptip { pointer-events: none; opacity: 0; transition: opacity .18s ease; }
    .pin:hover .ptip,
    .pin:focus .ptip { opacity: 1; }

    /* ── DETAIL CARD ── */
    #card {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(110%);
      width: min(500px, calc(100vw - 28px));
      background: rgba(255,255,255,.97);
      backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
      border: 1px solid rgba(219,39,119,.17); border-bottom: none;
      border-radius: 26px 26px 0 0;
      padding: 26px 32px 48px; z-index: 110;
      box-shadow: 0 -10px 44px rgba(219,39,119,.12);
      transition: transform .46s cubic-bezier(.34,1.56,.64,1); will-change: transform;
    }
    #card.open { transform: translateX(-50%) translateY(0); }

    .c-handle { width: 34px; height: 4px; background: rgba(219,39,119,.22); border-radius: 2px; margin: 0 auto 20px; }
    .c-top    { display: flex; align-items: flex-start; justify-content: space-between; gap: 14px; margin-bottom: 10px; }
    .c-badge  { display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: .62rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #fff; }
    .c-close  { width: 28px; height: 28px; border: none; border-radius: 50%; background: rgba(219,39,119,.08); cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--pink); flex-shrink: 0; transition: background .2s, transform .2s; }
    .c-close:hover { background: rgba(219,39,119,.18); transform: rotate(90deg); }
    .c-num    { font-size: .7rem; font-style: italic; color: #BE185D; letter-spacing: .06em; margin-bottom: 5px; }
    .c-title  { font-family: 'Great Vibes', cursive; font-size: clamp(1.8rem,3.5vw,2.5rem); color: var(--pink-deep); line-height: 1.05; margin-bottom: 4px; }
    .c-date   { font-style: italic; font-size: .95rem; color: var(--gold); letter-spacing: .04em; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .c-date::before { content: ''; display: inline-block; width: 16px; height: 1px; background: var(--gold); opacity: .6; }
    .c-rule   { height: 1px; background: linear-gradient(to right,transparent,rgba(219,39,119,.22),transparent); margin-bottom: 16px; }
    .c-desc   { font-style: italic; font-size: clamp(.95rem,1.4vw,1.1rem); line-height: 1.75; color: #4a1942; }
    .c-loc    { display: flex; align-items: center; gap: 6px; margin-top: 16px; font-size: .8rem; color: #BE185D; }
    .c-nav    { position: absolute; bottom: 44px; right: 32px; display: flex; gap: 8px; }
    .c-btn    { width: 32px; height: 32px; border: 1px solid rgba(219,39,119,.2); border-radius: 50%; background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--pink); transition: background .2s, transform .2s; }
    .c-btn:hover { background: rgba(219,39,119,.08); transform: scale(1.1); }

    /* ── BACKDROP ── */
    #bd { position: fixed; inset: 0; z-index: 100; opacity: 0; pointer-events: none; transition: opacity .28s ease; }
    #bd.on { opacity: 1; pointer-events: all; }

    /* ── LEGEND ── */
    #legend {
      position: fixed; bottom: 22px; left: 22px; z-index: 55;
      background: rgba(255,255,255,.88); backdrop-filter: blur(14px);
      border: 1px solid rgba(219,39,119,.13); border-radius: 14px;
      padding: 12px 16px 14px; box-shadow: 0 3px 20px rgba(219,39,119,.08);
      opacity: 0; animation: fadeIn .7s ease 2.4s forwards;
    }
    .leg-h   { font-size: .61rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #BE185D; margin-bottom: 9px; }
    .leg-row { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; font-size: .76rem; color: #831843; cursor: pointer; transition: opacity .18s; }
    .leg-row:last-child { margin-bottom: 0; }
    .leg-row:hover { opacity: .68; }
    .leg-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* ── KEYFRAMES ── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse  { 0% { r: 16; opacity: .65; } 100% { r: 38; opacity: 0; } }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<header id="hdr">
  <div>
    <div class="hdr-title">Our Story</div>
    <div class="hdr-sub">A Map of Every Moment</div>
  </div>
  <div class="hdr-right">
    <div class="hdr-count">16 Milestones</div>
    <div class="hdr-hint">Click any pin</div>
  </div>
</header>

<div id="map-wrap">
  <svg id="map-svg" viewBox="0 0 975 610" preserveAspectRatio="xMidYMid meet"
       role="img" aria-label="US map with relationship milestones"></svg>
</div>

<div id="bd" aria-hidden="true"></div>

<div id="card" role="dialog" aria-modal="true" aria-labelledby="c-title-el">
  <div class="c-handle" aria-hidden="true"></div>
  <div class="c-top">
    <span class="c-badge" id="c-badge-el"></span>
    <button class="c-close" id="c-close" aria-label="Close">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>
  <div class="c-num"  id="c-num-el"></div>
  <div class="c-title" id="c-title-el"></div>
  <div class="c-date"  id="c-date-el"></div>
  <div class="c-rule"  aria-hidden="true"></div>
  <div class="c-desc"  id="c-desc-el"></div>
  <div class="c-loc">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
      <circle cx="12" cy="9" r="2.5"/>
    </svg>
    <span id="c-loc-el"></span>
  </div>
  <div class="c-nav">
    <button class="c-btn" id="c-prev" aria-label="Previous milestone">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M15 18l-6-6 6-6"/>
      </svg>
    </button>
    <button class="c-btn" id="c-next" aria-label="Next milestone">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
        <path d="M9 18l6-6-6-6"/>
      </svg>
    </button>
  </div>
</div>

<div id="legend" role="complementary" aria-label="Category legend"></div>

<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
<script>
(() => {
  /* ================================================================
     DATA
  ================================================================ */
  const DATA = [
    { id:1,  label:"Where We Met",      date:"June 14, 2018",     lat:47.606, lng:-122.332, loc:"Seattle, WA",        cat:"beginning",   color:"#DB2777", icon:"coffee"   ,
      desc:"A chance encounter at Pike Place Market changed everything. You were buying peonies. I pretended to need directions." },
    { id:2,  label:"First Date",         date:"June 28, 2018",     lat:45.505, lng:-122.675, loc:"Portland, OR",       cat:"love",        color:"#E11D48", icon:"utensils" ,

    { id:5,  label:"Met The Families",   date:"November 28, 2018", lat:39.739, lng:-104.990, loc:"Denver, CO",         cat:"milestone",   color:"#7C3AED", icon:"users"    ,

      desc:"Snowed in for three days. We built the world's most lopsided snowman and drank cocoa until midnight." },
    { id:7,  label:"First Vacation",     date:"February 10, 2019", lat:25.762, lng:-80.192,  loc:"Miami, FL",          cat:"adventure",   color:"#059669", icon:"sun"      ,

    { id:8,  label:"The Proposal",       date:"December 31, 2019", lat:40.785, lng:-73.968,  loc:"New York, NY",       cat:"milestone",   color:"#CA8A04", icon:"ring"     ,
      desc:"One knee, Bethesda Fountain, confetti falling at midnight. The city was counting down. She said yes before I finished the question." },
    { id:9,  label:"Engagement Party",   date:"March 7, 2020",     lat:41.878, lng:-87.630,  loc:"Chicago, IL",        cat:"celebration", color:"#DB2777", icon:"glass"    ,
      desc:"All of our people in one room. Far too much champagne. A toast that made everyone cry. The beginning of planning everything." },
    { id:10, label:"Bachelorette Trip",  date:"August 15, 2020",   lat:36.163, lng:-86.782,  loc:"Nashville, TN",      cat:"celebration", color:"#F59E0B", icon:"music"    ,
      desc:"Broadway honky tonks, live music thundering out of every door. A karaoke performance that lives in infamy." },
    { id:11, label:"Wedding Day",        date:"October 10, 2020",  lat:32.081, lng:-81.091,  loc:"Savannah, GA",       cat:"wedding",     color:"#BE185D", icon:"rings"    ,
      desc:"I do, under Spanish moss and candlelight in an old garden. Every person we love, gathered together. The beginning of everything." },
    { id:12, label:"Honeymoon",          date:"October 18, 2020",  lat:29.951, lng:-90.072,  loc:"New Orleans, LA",    cat:"adventure",   color:"#7C3AED", icon:"note"     ,
      desc:"Jazz pouring out of every door. Beignets at 3am. Slow dances in the French Quarter with no audience but the city." },
    { id:13, label:"Our First Home",     date:"March 22, 2021",    lat:30.267, lng:-97.743,  loc:"Austin, TX",         cat:"milestone",   color:"#059669", icon:"home"     ,
      desc:"Key in hand, hearts completely full. We painted the living room three wrong colors before finding the right one." },
    { id:14, label:"First Pet Together", date:"July 4, 2021",      lat:44.978, lng:-93.265,  loc:"Minneapolis, MN",    cat:"joy",         color:"#EA580C", icon:"paw"      ,
      desc:"Rescued a golden retriever named Biscuit. He immediately destroyed both our shoes and stole our hearts completely." },
    { id:15, label:"First Anniversary",  date:"October 10, 2021",  lat:38.907, lng:-77.037,  loc:"Washington, DC",     cat:"anniversary", color:"#CA8A04", icon:"star"     ,
      desc:"One year. Cherry blossoms came late but we didn't mind. We walked and marveled that we get to keep doing this forever." },
    { id:16, label:"Baby News",          date:"January 14, 2022",  lat:42.360, lng:-71.059,  loc:"Boston, MA",         cat:"milestone",   color:"#F43F5E", icon:"heart2"   ,
      desc:"Two pink lines. We sat on the bathroom floor and cried happy tears for an hour. Everything changed, beautifully." }
  ];

  const CATS = {
    beginning:   { label:"How It Started", color:"#DB2777" },
    love:        { label:"Love Moments",   color:"#E11D48" },
    adventure:   { label:"Adventures",     color:"#D97706" },
    milestone:   { label:"Milestones",     color:"#7C3AED" },
    celebration: { label:"Celebrations",   color:"#0284C7" },
    wedding:     { label:"Wedding",        color:"#BE185D" },
    joy:         { label:"Pure Joy",       color:"#EA580C" },
    anniversary: { label:"Anniversaries",  color:"#CA8A04" }
  };

  /* Stroke icon paths — 24×24 viewBox, fill:none */
  const PATHS = {
    heart:    "M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z",
    heart2:   "M12 21c-5.63-5.54-11-10.3-11-14.4 0-3.8 3.07-5.2 5.28-5.2 1.31 0 4.15 1.02 5.72 4.96 1.55-3.94 4.4-4.96 5.72-4.96 2.21 0 5.28 1.4 5.28 5.2 0 4.1-5.37 8.86-11 14.4z",
    coffee:   "M17 8h1a4 4 0 0 1 0 8h-1 M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4z M6 1v3 M10 1v3 M14 1v3",
    utensils: "M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2 M7 2v20 M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3v7",
    map:      "M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z M8 2v16 M16 6v16",
    users:    "M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2 M9 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z M23 21v-2a4 4 0 0 0-3-3.87 M16 3.13a4 4 0 0 1 0 7.75",
    snow:     "M12 2v20 M2 12h20 M4.93 4.93l14.14 14.14 M19.07 4.93 4.93 19.07",
    sun:      "M12 1v2 M12 21v2 M4.22 4.22l1.42 1.42 M18.36 18.36l1.42 1.42 M1 12h2 M21 12h2 M4.22 19.78l1.42-1.42 M18.36 5.64l1.42-1.42 M12 17a5 5 0 1 0 0-10 5 5 0 0 0 0 10z",
    ring:     "M12 22c5.52 0 10-4.48 10-10S17.52 2 12 2 2 6.48 2 12s4.48 10 10 10z M12 8v4 M12 16h.01",
    glass:    "M8 22h8 M7 10h10 M12 15v7 M17 2H7l2 8c0 2.76 1.34 4 3 4s3-1.24 3-4z",
    music:    "M9 18V5l12-2v13 M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z M21 16a3 3 0 1 1-6 0 3 3 0 0 1 6 0z",
    rings:    "M12 4a2 2 0 1 0 4 0 2 2 0 0 0-4 0z M8 16a2 2 0 1 0 4 0 2 2 0 0 0-4 0z M14.5 6A6 6 0 0 1 20 12a6 6 0 0 1-6 6 M9.5 18A6 6 0 0 1 4 12a6 6 0 0 1 6-6",
    note:     "M9 18V5l12-2v13 M9 18a3 3 0 1 1-6 0 3 3 0 0 1 6 0z",
    home:     "M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z M9 22V12h6v10",
    paw:      "M12 10a2 2 0 1 0 0-4 2 2 0 0 0 0 4z M7.5 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z M16.5 9.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z M5 15a2 2 0 1 0 0-4 2 2 0 0 0 0 4z M19 15a2 2 0 1 0 0-4 2 2 0 0 0 0 4z M8.5 20.5c1.5-2 6-2 7 0",
    star:     "M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"
  };

  /* ================================================================
     PARTICLES
  ================================================================ */
  const cvs = document.getElementById('particles');
  const pctx = cvs.getContext('2d');
  let pts = [];
  const PC = ['#DB2777','#F472B6','#CA8A04','#FDE68A','#E11D48','#FECDD3'];

  function resize() { cvs.width = innerWidth; cvs.height = innerHeight; }
  resize(); addEventListener('resize', resize);

  function newPt() {
    return {
      x: Math.random() * cvs.width, y: cvs.height + 12,
      s: Math.random() * 7 + 3,
      vy: Math.random() * .55 + .25, vx: (Math.random() - .5) * .4,
      a: Math.random() * .3 + .07,
      rot: Math.random() * Math.PI * 2, rv: (Math.random() - .5) * .025,
      c: PC[Math.floor(Math.random() * PC.length)],
      heart: Math.random() < .55
    };
  }

  function drawHeart(c, x, y, r, col, a) {
    c.save(); c.globalAlpha = a; c.fillStyle = col;
    c.beginPath();
    c.moveTo(x, y + r * .3);
    c.bezierCurveTo(x,   y,         x - r, y,         x - r, y + r * .3);
    c.bezierCurveTo(x - r, y + r * .7, x, y + r * 1.1, x,   y + r * 1.3);
    c.bezierCurveTo(x,   y + r * 1.1, x + r, y + r * .7, x + r, y + r * .3);
    c.bezierCurveTo(x + r, y,     x,   y,         x,   y + r * .3);
    c.fill(); c.restore();
  }

  (function tick() {
    pctx.clearRect(0, 0, cvs.width, cvs.height);
    if (Math.random() < .06) pts.push(newPt());
    pts = pts.filter(p => {
      p.y -= p.vy; p.x += p.vx; p.rot += p.rv;
      pctx.save(); pctx.translate(p.x, p.y); pctx.rotate(p.rot);
      if (p.heart) drawHeart(pctx, -p.s * .5, -p.s * .65, p.s * .5, p.c, p.a);
      else {
        pctx.globalAlpha = p.a; pctx.fillStyle = p.c;
        pctx.beginPath(); pctx.arc(0, 0, p.s * .32, 0, Math.PI * 2); pctx.fill();
      }
      pctx.restore();
      return p.y > -20;
    });
    requestAnimationFrame(tick);
  })();

  /* ================================================================
     MAP
  ================================================================ */
  const W = 975, H = 610;
  const proj  = d3.geoAlbersUsa().scale(1300).translate([W / 2, H / 2]);
  const gpath = d3.geoPath().projection(proj);
  const svg   = d3.select('#map-svg');
  const root  = svg.append('g').style('opacity', 0);

  d3.json('https://cdn.jsdelivr.net/npm/us-atlas@3/states-10m.json').then(us => {

    /* States */
    root.selectAll('.state')
        .data(topojson.feature(us, us.objects.states).features)
        .join('path').attr('class', 'state').attr('d', gpath);

    /* State borders */
    root.append('path')
        .datum(topojson.mesh(us, us.objects.states, (a, b) => a !== b))
        .attr('class', 'borders').attr('d', gpath);

    /* Nation outline */
    root.append('path')
        .datum(topojson.feature(us, us.objects.nation))
        .attr('class', 'nation').attr('d', gpath);

    /* ---------------------------------------------------------
       JOURNEY SEGMENTS
       Only draw short dashed lines between chronologically
       consecutive milestones that are geographically close
       (< 240 SVG units apart). This avoids the cross-country
       chaos while still showing local geographic connections.
    --------------------------------------------------------- */
    const MAX_SEG_DIST = 240;
    for (let i = 1; i < DATA.length; i++) {
      const a = proj([DATA[i - 1].lng, DATA[i - 1].lat]);
      const b = proj([DATA[i].lng,     DATA[i].lat]);
      if (!a || !b) continue;
      const dist = Math.hypot(b[0] - a[0], b[1] - a[1]);
      if (dist > MAX_SEG_DIST) continue;

      /* Animate each segment's stroke with a delay */
      const seg = root.append('line')
        .attr('class', 'jseg')
        .attr('x1', a[0]).attr('y1', a[1])
        .attr('x2', a[0]).attr('y2', a[1]); /* start collapsed */

      seg.transition()
         .duration(600)
         .delay(1600 + i * 80)
         .ease(d3.easeCubicOut)
         .attr('x2', b[0]).attr('y2', b[1]);
    }

    /* ---------------------------------------------------------
       PINS
       Two-group structure:
         .pin  (outer) — positioned at [x,y] via SVG translate, never changed
         .pv   (inner) — scaled 0→1 via D3 transition for entrance animation
                         and CSS hover transform via transform-box:fill-box
    --------------------------------------------------------- */
    DATA.forEach((m, i) => {
      const p = proj([m.lng, m.lat]);
      if (!p) return;
      const [x, y] = p;

      /* Outer group: positioned, cursor, events */
      const g = root.append('g')
        .attr('class', 'pin')
        .attr('transform', `translate(${x},${y})`)
        .attr('tabindex', 0)
        .attr('role', 'button')
        .attr('aria-label', `${m.label} — ${m.date}`);

      /* Pulse rings sit in outer group so they expand from pin center */
      [0, 1].forEach(() =>
        g.append('circle').attr('class', 'ring').attr('r', 16).attr('stroke', m.color)
      );

      /* Inner visual group — this is what we scale 0→1 */
      const pv = g.append('g')
        .attr('class', 'pv')
        .attr('transform', 'scale(0)'); /* collapsed initially */

      /* Drop shadow */
      pv.append('ellipse')
        .attr('cx', 0).attr('cy', 19)
        .attr('rx', 7).attr('ry', 2.5)
        .attr('fill', 'rgba(0,0,0,.12)');

      /* Pointer triangle */
      pv.append('polygon')
        .attr('points', '-6,8 6,8 0,23')
        .attr('fill', m.color);

      /* Main circle */
      pv.append('circle')
        .attr('r', 13)
        .attr('fill', m.color);

      /* Inner glow ring */
      pv.append('circle')
        .attr('r', 11).attr('fill', 'none')
        .attr('stroke', 'rgba(255,255,255,.28)').attr('stroke-width', 1.5);

      /* Icon — 24×24 path scaled down to fit inside the 13r circle.
         Scale factor 0.38 → ~9px wide. Stroke-width compensated: 2 / 0.38 ≈ 5.3  */
      const SC = 0.38;
      const IC_OFF = -(12 * SC); /* offset so icon is centered at (0,0) */
      const ig = pv.append('g').attr('transform', `translate(${IC_OFF},${IC_OFF}) scale(${SC})`);
      (PATHS[m.icon] || PATHS.heart).split(/(?=M)/g).filter(Boolean).forEach(seg =>
        ig.append('path').attr('d', seg.trim())
          .attr('stroke', 'white').attr('stroke-width', 5.3)
          .attr('fill', 'none')
          .attr('stroke-linecap', 'round').attr('stroke-linejoin', 'round')
      );

      /* Number badge — top-right corner */
      pv.append('circle')
        .attr('cx', 10).attr('cy', -10).attr('r', 6.5)
        .attr('fill', 'white').attr('stroke', m.color).attr('stroke-width', 1.5);
      pv.append('text')
        .attr('x', 10).attr('y', -10)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('font-size', m.id < 10 ? '6px' : '5px')
        .attr('font-weight', '700').attr('fill', m.color)
        .attr('font-family', 'Cormorant Infant, serif')
        .text(m.id);

      /* Tooltip — also in outer group so it doesn't scale with pin */
      const tw  = Math.max(m.label.length * 5.5 + 24, 82);
      const tip = g.append('g').attr('class', 'ptip').attr('transform', 'translate(0,-56)');
      tip.append('rect')
         .attr('x', -tw / 2).attr('y', -22).attr('width', tw).attr('height', 36).attr('rx', 7)
         .attr('fill', 'white')
         .attr('filter', 'drop-shadow(0 3px 12px rgba(157,23,77,.2))');
      tip.append('polygon')
         .attr('points', '-5,14 5,14 0,21').attr('fill', 'white');
      tip.append('text')
         .attr('x', 0).attr('y', -6).attr('text-anchor', 'middle')
         .attr('font-size', '10px').attr('font-weight', '600').attr('fill', '#9D174D')
         .attr('font-family', 'Cormorant Infant, serif').text(m.label);
      tip.append('text')
         .attr('x', 0).attr('y', 8).attr('text-anchor', 'middle')
         .attr('font-size', '8px').attr('fill', '#CA8A04').attr('font-style', 'italic')
         .attr('font-family', 'Cormorant Infant, serif').text(m.date);

      /* Events */
      g.on('click',   () => openCard(m.id))
       .on('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openCard(m.id); } });

      /* D3 transition entrance: scale(0) → scale(1) with spring easing.
         Using SVG attr transform — reliable on SVG elements, no CSS origin issues. */
      pv.transition()
        .duration(700)
        .delay(1400 + i * 90)
        .ease(d3.easeBackOut.overshoot(1.6))
        .attr('transform', 'scale(1)');
    });

    /* Fade in the whole root group */
    root.transition().duration(1000).ease(d3.easeCubicOut).style('opacity', 1);

  }).catch(err => console.error('Map load error:', err));

  /* ================================================================
     DETAIL CARD
  ================================================================ */
  let activeId = null;

  function openCard(id) {
    const m = DATA.find(x => x.id === id);
    if (!m) return;
    activeId = id;
    const cat = CATS[m.cat];

    const badge = document.getElementById('c-badge-el');
    badge.textContent    = cat.label;
    badge.style.background = cat.color;

    document.getElementById('c-num-el').textContent   = `Milestone ${m.id} of ${DATA.length}`;
    document.getElementById('c-title-el').textContent = m.label;
    document.getElementById('c-date-el').textContent  = m.date;
    document.getElementById('c-desc-el').textContent  = m.desc;
    document.getElementById('c-loc-el').textContent   = m.loc;

    document.getElementById('card').classList.add('open');
    document.getElementById('bd').classList.add('on');
  }

  function closeCard() {
    activeId = null;
    document.getElementById('card').classList.remove('open');
    document.getElementById('bd').classList.remove('on');
  }

  document.getElementById('c-close').addEventListener('click', closeCard);
  document.getElementById('bd').addEventListener('click', closeCard);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCard(); });

  document.getElementById('c-prev').addEventListener('click', () => {
    if (activeId === null) return;
    const i = DATA.findIndex(m => m.id === activeId);
    openCard(DATA[(i - 1 + DATA.length) % DATA.length].id);
  });
  document.getElementById('c-next').addEventListener('click', () => {
    if (activeId === null) return;
    const i = DATA.findIndex(m => m.id === activeId);
    openCard(DATA[(i + 1) % DATA.length].id);
  });

  /* ================================================================
     LEGEND — safe DOM, no innerHTML
  ================================================================ */
  const leg  = document.getElementById('legend');
  const legH = document.createElement('div');
  legH.className   = 'leg-h';
  legH.textContent = 'Categories';
  leg.appendChild(legH);

  const seen = new Set();
  DATA.forEach(m => {
    if (seen.has(m.cat)) return;
    seen.add(m.cat);
    const cat = CATS[m.cat];

    const row = document.createElement('div');
    row.className = 'leg-row';
    row.setAttribute('role', 'button');
    row.setAttribute('tabindex', '0');
    row.setAttribute('aria-label', `Open first ${cat.label} milestone`);

    const dot = document.createElement('div');
    dot.className        = 'leg-dot';
    dot.style.background = cat.color;

    const lbl = document.createElement('span');
    lbl.textContent = cat.label;

    row.appendChild(dot);
    row.appendChild(lbl);

    const firstInCat = DATA.find(x => x.cat === m.cat);
    const handler = () => { if (firstInCat) openCard(firstInCat.id); };
    row.addEventListener('click', handler);
    row.addEventListener('keydown', e => { if (e.key === 'Enter') handler(); });
    leg.appendChild(row);
  });

})();
</script>
</body>
</html>
